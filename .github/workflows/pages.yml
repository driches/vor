name: Pages

on:
  push:
    branches: [main]
    paths: &site_paths
      - 'site/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CONTRIBUTING.md'
      - 'AGENTS.md'
      - 'CODE_OF_CONDUCT.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  # PRs that touch the site or any synced source build (but don't deploy), so a
  # broken MDX page, Astro config, or sync script is caught before it reaches main.
  pull_request:
    paths: *site_paths
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Scope by ref so PR builds never queue behind (or block) a production deploy.
# Let in-flight production deploys finish rather than cancelling them.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    # PR runs validate the build only; deploys happen on push to main / dispatch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
