name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run verify-dist

      - name: Extract major version
        id: major
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          MAJOR="${TAG%%.*}"   # v1.2.3 → v1
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Move major tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f "${{ steps.major.outputs.major }}" "${{ steps.major.outputs.tag }}"
          git push origin --force "${{ steps.major.outputs.major }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.major.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.major.outputs.tag }}"
