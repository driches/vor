name: Self Review (dogfood)

# Manual-only trigger. The pull_request auto-trigger was disabled after
# v0.4.0 merge because the review loop was generating too many false-
# positive findings (hallucinated ESLint flag removals, contradictory
# knip exit-code claims, etc.) and the iteration churn outweighed the
# bug-catching value. Re-enable by adding `pull_request:` back to `on:`
# once we have better grounding discipline in the review prompt.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Build the bundle from source so we dogfood the actual code in this PR,
      # not the committed dist/index.js. (For consumer repos, the committed
      # dist/ is what runs.)
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - uses: ./
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
