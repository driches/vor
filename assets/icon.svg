<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" width="128" height="128">
  <title>Vor</title>
  <desc>An almond eye whose iris is three horizontal diff lines, with the middle line highlighted in coral — representing an inline code review comment anchored to a specific line.</desc>

  <!-- Brow / lash stroke above the eye -->
  <path d="M 32 30 Q 64 18 96 30"
        fill="none"
        stroke="#6E3FE7"
        stroke-width="3.5"
        stroke-linecap="round" />

  <!-- Almond eye outline -->
  <path d="M 20 64 Q 64 16 108 64 Q 64 112 20 64 Z"
        fill="none"
        stroke="#6E3FE7"
        stroke-width="4"
        stroke-linejoin="round" />

  <!-- Iris: three diff lines, middle one highlighted -->
  <line x1="46" y1="54" x2="82" y2="54" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round" />
  <line x1="42" y1="64" x2="86" y2="64" stroke="#F0875F" stroke-width="4" stroke-linecap="round" />
  <line x1="48" y1="74" x2="80" y2="74" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round" />
</svg>
